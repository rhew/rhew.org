services:
  rhew.org:
    build:
      args:
        HUGO_BASEURL: https://localhost/projects/
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile
  manager:
    volumes:
      - ./podcast-manager/config_local.py:/usr/src/app/config.py
    environment:
      INTERVAL: '10'
      PODCAST_ROOT: 'https://localhost/podcasts'
